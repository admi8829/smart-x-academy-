plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

android {
    namespace "com.smartx.edu"
    compileSdkVersion flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.smartx.edu"
        minSdkVersion 21
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            // Prevents shrinking-related AdMob runtime crashes or build bugs
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source '../..'
}

dependencies {
}

configurations.all {
    resolutionStrategy {
        // Force newer AndroidX WorkManager and Room versions required by google_mobile_ads (play-services-ads:24.9.0)
        force 'androidx.work:work-runtime:2.9.0'
        force 'androidx.work:work-runtime-ktx:2.9.0'
        force 'androidx.room:room-runtime:2.6.1'
        force 'androidx.room:room-ktx:2.6.1'
        
        // Align lifecycle and SQLite packages to guarantee runtime classpath harmony
        force 'androidx.sqlite:sqlite:2.4.0'
        force 'androidx.sqlite:sqlite-framework:2.4.0'
        force 'androidx.lifecycle:lifecycle-runtime:2.7.0'
        force 'androidx.lifecycle:lifecycle-runtime-ktx:2.7.0'
        force 'androidx.lifecycle:lifecycle-viewmodel:2.7.0'
        force 'androidx.lifecycle:lifecycle-viewmodel-ktx:2.7.0'
        force 'androidx.lifecycle:lifecycle-livedata:2.7.0'
        force 'androidx.lifecycle:lifecycle-livedata-core:2.7.0'
        force 'androidx.lifecycle:lifecycle-common:2.7.0'
    }
}

