name: Flutter Build APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Setup Flutter Environment
      # Having Flutter set up first allows us to dynamically bootstrap project wrapper directories.
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # Step 3: Recreate Android Project Wrapper
      # Recreates the android/ directory containing Gradle wrapper scripts, so the Java JDK setup step can cache gradle builds correctly.
      - name: Recreate Android Project Wrapper
        run: |
          # 1. Back up our beautifully crafted custom project files
          mkdir -p android_backup/app/src/main/kotlin/com/smartxacademy/app
          mkdir -p android_backup/app/src/debug
          mkdir -p android_backup/app/src/profile
          cp android/app/build.gradle android_backup/app/build.gradle
          cp android/build.gradle android_backup/build.gradle
          cp android/settings.gradle android_backup/settings.gradle
          cp android/app/google-services.json android_backup/app/google-services.json
          cp android/app/src/main/AndroidManifest.xml android_backup/app/src/main/AndroidManifest.xml
          cp android/app/src/debug/AndroidManifest.xml android_backup/app/src/debug/AndroidManifest.xml
          cp android/app/src/profile/AndroidManifest.xml android_backup/app/src/profile/AndroidManifest.xml
          cp android/app/src/main/kotlin/com/smartxacademy/app/MainActivity.kt android_backup/app/src/main/kotlin/com/smartxacademy/app/MainActivity.kt

          # 2. Run flutter create to let it populate the gradle wrapper files and wrapper binaries
          flutter create --project-name=smart_x_academy --platforms=android --no-pub .

          # 3. Restore all our pristine, fully-configured custom builds and manifests
          cp android_backup/app/build.gradle android/app/build.gradle
          cp android_backup/build.gradle android/build.gradle
          cp android_backup/settings.gradle android/settings.gradle
          cp android_backup/app/google-services.json android/app/google-services.json
          cp android_backup/app/src/main/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          cp android_backup/app/src/debug/AndroidManifest.xml android/app/src/debug/AndroidManifest.xml
          cp android_backup/app/src/profile/AndroidManifest.xml android/app/src/profile/AndroidManifest.xml
          
          # Clean default flutter-created kotlin path to avoid multiple package conflicts and write our custom MainActivity
          rm -rf android/app/src/main/kotlin/com/example
          rm -rf android/app/src/main/kotlin/com/smartx
          mkdir -p android/app/src/main/kotlin/com/smartxacademy/app
          cp android_backup/app/src/main/kotlin/com/smartxacademy/app/MainActivity.kt android/app/src/main/kotlin/com/smartxacademy/app/MainActivity.kt

          # Clean up backup
          rm -rf android_backup

      # Step 4: Set up Java 17 (Required for Android Builds)
      # Now that Gradle configurations from 'flutter create' are generated in the preceding step, this runs flawlessly.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      # Step 5: Install Dependencies
      - name: Install Dependencies
        run: flutter pub get

      # Step 5.5: Patch Proguard support for older libraries (e.g. flutter_inappwebview_android)
      - name: Patch Proguard in pub-cache and workspace
        run: |
          find . -name "build.gradle" -exec sed -i "s/proguard-android.txt/proguard-android-optimize.txt/g" {} +
          find ~/.pub-cache -name "build.gradle" -exec sed -i "s/proguard-android.txt/proguard-android-optimize.txt/g" {} +

      # Step 6: Format Code
      - name: Format Code
        run: dart format lib/

      # Step 7: Static Code Analysis (Linter)
      - name: Run Linter Analyzers
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      # Step 8: Run Unit & Widget Tests
      # Kept robust and asset-independent to prevent standard test failures
      - name: Run Widget Tests
        run: flutter test

      # Step 9: Compile Production Release APK
      - name: Build Release APK
        run: flutter build apk --release --no-pub

      # Step 10: Archive compiled APK artifact
      - name: Upload APK Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart-x-academy-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 7
