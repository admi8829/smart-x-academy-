name: Flutter Android Build & SHA Key Extraction

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger from mobile GitHub app or website

jobs:
  build:
    name: Build APKs & Extract SHA Fingerprints
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up Flutter Environment
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # Step 3: Set up Java 17 (Required for Android builds)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      # Step 4: Install Dependencies
      - name: Install Dependencies
        run: flutter pub get

      # Step 5: Patch Proguard support for libraries in the workspace
      - name: Patch Proguard in pub-cache and workspace
        run: |
          find . -name "build.gradle" -exec sed -i "s/proguard-android.txt/proguard-android-optimize.txt/g" {} +
          find ~/.pub-cache -name "build.gradle" -exec sed -i "s/proguard-android.txt/proguard-android-optimize.txt/g" {} +

      # Step 6: Generate and Output SHA-1 & SHA-256 signingReport
      # Runs global "gradle signingReport" in the "android" folder to bypass the missing local gradlew script.
      - name: Generate and Output SHA-1 & SHA-256 signingReport
        run: |
          cd android
          gradle signingReport

      # Step 7: Build DEBUG APK as explicitly requested
      - name: Build Debug APK
        run: flutter build apk --debug --no-pub --android-skip-build-dependency-validation

      # Step 8: Build RELEASE APK
      - name: Build Release APK
        run: flutter build apk --release --no-pub --android-skip-build-dependency-validation

      # Step 9: Upload Debug APK Artifact
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: smart-x-academy-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: warn
          retention-days: 7

      # Step 10: Upload Release APK Artifact
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: smart-x-academy-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: warn
          retention-days: 7
