name: Flutter Build APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up Java 17 (Required for Android Builds)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      # Step 3: Setup Flutter Environment
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'
          channel: 'stable'
          cache: true

      # Step 4: Install Dependencies
      - name: Install Dependencies
        run: flutter pub get

      # Step 5: Format Check
      - name: Check Formatting
        run: flutter format --set-exit-if-changed lib/

      # Step 6: Static Code Analysis (Linter)
      - name: Run Linter Analyzers
        run: flutter analyze

      # Step 7: Run Unit & Widget Tests
      # Kept robust and asset-independent to prevent standard test failures
      - name: Run Widget Tests
        run: flutter test

      # Step 8: Compile Production Release APK
      - name: Build Release APK
        run: flutter build apk --release --no-pub

      # Step 9: Archive compiled APK artifact
      - name: Upload APK Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart-x-academy-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 7
