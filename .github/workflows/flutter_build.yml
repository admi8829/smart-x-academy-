name: Flutter Build APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Setup Flutter Environment
      # Having Flutter set up first allows us to dynamically bootstrap project wrapper directories.
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # Step 3: Recreate Android Project Wrapper
      # Recreates the android/ directory containing Gradle wrapper scripts, so the Java JDK setup step can cache gradle builds correctly.
      - name: Recreate Android Project Wrapper
        run: |
          flutter create --project-name=smart_x_academy --platforms=android --no-pub .
          if ! grep -q "android.permission.INTERNET" android/app/src/main/AndroidManifest.xml; then
            sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET"/>' android/app/src/main/AndroidManifest.xml
          fi

      # Step 4: Set up Java 17 (Required for Android Builds)
      # Now that Gradle configurations from 'flutter create' are generated in the preceding step, this runs flawlessly.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      # Step 5: Install Dependencies
      - name: Install Dependencies
        run: flutter pub get

      # Step 5.5: Patch Proguard support for older libraries (e.g. flutter_inappwebview_android)
      - name: Patch Proguard in pub-cache and workspace
        run: |
          find . -name "build.gradle" -exec sed -i "s/proguard-android.txt/proguard-android-optimize.txt/g" {} +
          find ~/.pub-cache -name "build.gradle" -exec sed -i "s/proguard-android.txt/proguard-android-optimize.txt/g" {} +

      # Step 6: Format Code
      - name: Format Code
        run: dart format lib/

      # Step 7: Static Code Analysis (Linter)
      - name: Run Linter Analyzers
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      # Step 8: Run Unit & Widget Tests
      # Kept robust and asset-independent to prevent standard test failures
      - name: Run Widget Tests
        run: flutter test

      # Step 9: Compile Production Release APK
      - name: Build Release APK
        run: flutter build apk --release --no-pub

      # Step 10: Archive compiled APK artifact
      - name: Upload APK Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart-x-academy-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 7
