name: Build and Sign Android App

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get Packages
        run: flutter pub get

      - name: Set up Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Run Gradle Signing Report
        run: |
          cd android
          gradle wrapper
          chmod +x gradlew
          ./gradlew signingReport

      - name: Build Code Artifact (APK)
        run: flutter build apk --release --split-per-abi

      - name: Upload compiled APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: smartx-release-apk
          path: build/app/outputs/flutter-apk/*.apk

      - name: Create GitHub Release & Upload Release APK
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v1.0.2-build.${{ github.run_number }}" \
            build/app/outputs/flutter-apk/*.apk \
            --title "Release v1.0.2 (Build #${{ github.run_number }})" \
            --notes "Interactive automatic production release of Smart X Academy. Built on $(date +'%Y-%m-%d %H:%M:%S UTC'). This package contains full Grades 9-12 curriculum syllabus courses, offline preview summary cards, interactive student profile register features, and optimized AdMob banners implementation."

