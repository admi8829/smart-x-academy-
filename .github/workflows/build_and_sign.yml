name: Build and Sign Android App

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get Packages
        run: flutter pub get

      - name: Run Gradle Signing Report
        run: |
          cd android
          chmod +x gradlew
          ./gradlew signingReport

      - name: Build Code Artifact (APK)
        run: flutter build apk --release

      - name: Upload compiled APK
        uses: actions/upload-artifact@v4
        with:
          name: smartx-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
